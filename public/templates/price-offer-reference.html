<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-color: {{primaryColor}};
      --accent-color: {{accentColor}};
      --bg-blur: 6px;
      --bg-brightness: 0.35;
      --headline-size: 72px;
      --price-size: 96px;
      --person-scale: 0.85;
      --person-position-y: 5%;
      --person-position-x: 0%;
      --location-size: 28px;
      --strikethrough-size: 28px;
      --headline-rotation: 0deg;
      --price-rotation: 0deg;
      --content-padding: 40px;
      --location-x: 50%;
      --location-y: 4%;
      --headline-x: 50%;
      --headline-y: 62%;
      --price-block-x: 50%;
      --price-block-y: 78%;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    .creative-container {
      width: {{width}}px;
      height: {{height}}px;
      position: relative;
      overflow: hidden;
      font-family: 'Montserrat', sans-serif;
      background: #0a0a0a;
    }

    .background {
      position: absolute;
      inset: 0;
      background-image: url('{{backgroundImage}}');
      background-size: cover;
      background-position: center;
      filter: blur(var(--bg-blur)) brightness(var(--bg-brightness));
      transform: scale(1.15);
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.2) 0%,
        rgba(0,0,0,0.1) 30%,
        rgba(0,0,0,0.4) 60%,
        rgba(0,0,0,0.7) 100%
      );
      z-index: 1;
    }

    .person {
      position: absolute;
      z-index: 2;
      bottom: var(--person-position-y);
      left: calc(50% + var(--person-position-x));
      transform: translateX(-50%) scale(var(--person-scale));
      height: 85%;
      width: auto;
      object-fit: contain;
      filter: drop-shadow(0 4px 20px rgba(0,0,0,0.5));
    }

    .location {
      position: absolute;
      z-index: 3;
      left: var(--location-x);
      top: var(--location-y);
      transform: translateX(-50%);
      font-size: var(--location-size);
      font-weight: 700;
      color: white;
      text-align: center;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
      text-transform: uppercase;
      letter-spacing: 2px;
      white-space: nowrap;
    }

    .headline {
      position: absolute;
      z-index: 3;
      left: var(--headline-x);
      top: var(--headline-y);
      transform: translateX(-50%) rotate(var(--headline-rotation));
      font-size: var(--headline-size);
      font-weight: 900;
      color: white;
      text-transform: uppercase;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
      line-height: 1.05;
      text-align: center;
      white-space: nowrap;
    }

    .price-block {
      position: absolute;
      z-index: 3;
      left: var(--price-block-x);
      top: var(--price-block-y);
      transform: translateX(-50%) rotate(var(--price-rotation));
      background: rgba(0, 0, 0, 0.75);
      padding: 12px 40px;
      border-radius: 8px;
      text-align: center;
    }

    .price {
      font-size: var(--price-size);
      font-weight: 900;
      color: var(--accent-color);
      text-shadow: 0 0 30px rgba(255,69,0,0.3);
      line-height: 1.1;
    }

    .original-price {
      font-size: var(--strikethrough-size);
      font-weight: 700;
      color: rgba(255,255,255,0.6);
      text-decoration: line-through;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="creative-container">
    <div class="background"></div>
    <div class="overlay"></div>
    <img class="person" src="{{personImage}}" alt="">
    <div class="location" data-draggable="location">{{location}}</div>
    <h1 class="headline" data-draggable="headline">{{headline}}</h1>
    <div class="price-block" data-draggable="price-block">
      <div class="price">{{price}}</div>
      <div class="original-price">Statt {{originalPrice}}</div>
    </div>
  </div>
</body>
</html>
